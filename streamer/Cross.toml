# On Apple Silicon (M1/M2/M3/M4) the cross image only ships an amd64 manifest.
# Set DOCKER_DEFAULT_PLATFORM=linux/amd64 when invoking cross (see README Option B).
[target.aarch64-unknown-linux-gnu]
pre-build = [
    "apt-get update -qq",
    "apt-get install -y --no-install-recommends curl apt-transport-https ca-certificates",
    # Enable arm64 multiarch. Restrict existing sources to amd64 only, then add
    # ports.ubuntu.com so apt can fetch arm64 packages (libx264, libv4l2) for linking.
    "dpkg --add-architecture arm64",
    "sed -i 's|^deb http|deb [arch=amd64] http|g' /etc/apt/sources.list",
    "echo 'deb [arch=arm64] http://ports.ubuntu.com/ubuntu-ports xenial main universe' >> /etc/apt/sources.list",
    "echo 'deb [arch=arm64] http://ports.ubuntu.com/ubuntu-ports xenial-updates main universe' >> /etc/apt/sources.list",
    "apt-get update -qq",
    "apt-get install -y --no-install-recommends libx264-dev:arm64 libv4l-dev:arm64",
    # The cross base image ships libclang 3.8; bindgen 0.70.x requires >= 5.0.
    # Add the LLVM APT repo for this Ubuntu release and install clang-9.
    "curl -fsSL https://apt.llvm.org/llvm-snapshot.gpg.key | apt-key add -",
    ". /etc/os-release && echo \"deb http://apt.llvm.org/$UBUNTU_CODENAME/ llvm-toolchain-$UBUNTU_CODENAME-9 main\" | tee /etc/apt/sources.list.d/llvm.list",
    "apt-get update -qq",
    "apt-get install -y --no-install-recommends clang-9 libclang-9-dev",
]

[target.aarch64-unknown-linux-gnu.env.set]
# Force bindgen to load clang-9 instead of the system 3.8 stub.
LIBCLANG_PATH = "/usr/lib/llvm-9/lib"
# Use arm64 pkg-config files so x264-sys finds the correct x264 version.
PKG_CONFIG_ALLOW_CROSS = "1"
PKG_CONFIG_PATH = "/usr/lib/aarch64-linux-gnu/pkgconfig"
